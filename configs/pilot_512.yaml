# Short pilot config for checking whether metrics move in the right direction.

model:
  coarse_model:
    enabled: true
    class: "CoarseModel"
    channels: [64, 128, 256, 384, 512]
    head_channels: 32
    use_rep_blocks: true
  inpainter:
    kernel_size: 8
    value_patch_size: 8
    attention_temperature: 0.5
    attention_top_k: null
    attention_selection: "softmax"
    attention_eval_selection: "softmax"
    attention_gumbel_tau: 1.0
    attention_normalize_qk: true
    use_transport: false
    transport_hidden_channels: 64
    transport_refine_steps: 2
    transport_offset_scale: 1.0
    transport_refine_scale: 0.25
    transport_use_score_init: true
    transport_score_temperature: 0.5
    transport_score_top_k: 32
    transport_score_init_scale: 1.0
    transport_use_coarse_to_fine: false
    transport_coarse_ratio: 2
    transport_use_confidence: false
    transport_use_local_refinement: false
    transport_local_window_size: 3
    transport_local_temperature: 0.5
    transport_use_propagation: false
    transport_propagation_steps: 1
    transport_fallback_validity_threshold: 0.1
    transport_snap_to_valid_eval: true
    transport_train_selection: "bilinear"
    transport_eval_selection: "nearest_valid"
    matching_descriptor_dim: null
    matching_hidden_dim: null
    match_coarse_rgb: true
    coarse_rgb_branch_dropout: 0
    query_image_context_matching: true
    key_image_context_matching: false
    query_boundary_only_matching: false
    query_boundary_inner_dilation: 0
    query_boundary_outer_dilation: 16
    separate_query_key_matching: false
    shared_query_key_descriptor: false
    query_context_channels: 32
    query_context_residual_init: 0.1
    key_context_channels: 32
    key_coarse_rgb_residual_init: 0.25
    key_feature_residual_init: 0.25
    nheads: 1
    stem_out_stride: 1
    stem_out_channels: 3
    image_size: 512
    embed_dim: 2048
    use_positional_encoding: false
    dropout: 0.1
    feature_i: 3
    feature_dim: null
    concat_features: true
    detach_coarse_rgb: false
    final_conv: true
    attention_masking: true

data:
  root_dir: "."
  manifest_path: "dataset/manifests/supercaf_manifest.csv"
  val_dir: null
  image_size: 1024
  batch_size: 4
  eval_batch_size: 2
  num_workers: 2
  mask_min_coverage: 0.10
  mask_max_coverage: 0.30
  mask_generator:
    style: "freeform"
    min_capsule_length_ratio: 0.035
    max_capsule_length_ratio: 0.16
    min_capsule_width_ratio: 0.008
    max_capsule_width_ratio: 0.035
    min_component_count: 10
    max_component_count: 28
    articulated_probability: 0.25
    connector_probability: 0.15
    overlap_tolerance: 0.08
  force_random_masks_train: true
  force_random_masks_eval: true

training:
  total_epochs: 66
  grad_accum_steps: 32
  lr: 0.001
  scorer_lr: 0.001
  warmup_epochs: 5
  min_lr: 0.000001
  scorer_min_lr: 0.000001
  grad_clip: 1.0
  mixed_precision: true
  seed: 42
  betas: [0.9, 0.999]

loss:
  coarse_l2_weight: 1.0
  refined_l1_weight: 1.0
  refined_query_patch_l1_weight: 0.0
  focal_frequency_weight: 1.0
  focal_frequency_alpha: 1.0
  retrieval_loss_weight: 0.0
  retrieval_hard_ce_weight: 0.0
  retrieval_coherence_weight: 0.0
  retrieval_coherence_sigma: 0.10
  retrieval_teacher_patch_padding: 8
  retrieval_teacher_temperature: 0.05
  retrieval_target_margin_pct: 0.03
  transport_patch_weight: 0.0
  transport_selection_weight: 0.0
  transport_selection_temperature: 0.2
  transport_validity_weight: 0.0
  transport_offset_smoothness_weight: 0.0
  transport_offset_edge_scale: 5.0
  loss_schedule_focus_steps: 0
  loss_schedule_transition_steps: 0
  perceptual_weight: 0.15

logging:
  log_dir: "logs/pilot_512"
  log_interval: 25
  vis_interval_epochs: 5
  eval_interval_epochs: 5
  eval_batches: 8
  save_interval_epochs: 22
  save_checkpoints: true
  save_best_checkpoint: true
  save_best_metric: "masked_l1_hr_refined"
  save_best_mode: "min"
  save_final_checkpoint: true
  checkpoint_epochs: [21.978, 65.934]
  keep_last_checkpoints: 3
  print_train_metrics: true
