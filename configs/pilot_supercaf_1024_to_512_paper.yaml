# Short pilot config for checking whether paper-aligned metrics move in the right direction.

model:
  coarse_model:
    class: "CoarseModel"
    channels: [64, 128, 256, 384, 512]
    head_channels: 32
    use_rep_blocks: true
  generator:
    kernel_size: 8
    nheads: 1
    stem_out_stride: 1
    stem_out_channels: 3
    image_size: 512
    embed_dim: 2048
    use_positional_encoding: true
    dropout: 0.1
    feature_i: 2
    feature_dim: null
    concat_features: true
    final_conv: true
    attention_masking: true

data:
  root_dir: "."
  manifest_path: "dataset/manifests/supercaf_manifest.csv"
  val_dir: null
  image_size: 1024
  batch_size: 4
  eval_batch_size: 2
  num_workers: 2
  mask_min_coverage: 0.10
  mask_max_coverage: 0.40
  force_random_masks_train: true
  force_random_masks_eval: true

training:
  total_steps: 3000
  grad_accum_steps: 4
  lr: 0.001
  discriminator_lr: 0.00001
  warmup_steps: 200
  min_lr: 0.000001
  discriminator_min_lr: 0.0000001
  grad_clip: 1.0
  discriminator_grad_clip: 1.0
  mixed_precision: true
  seed: 42
  betas: [0.9, 0.999]

loss:
  coarse_l2_weight: 1.0
  coarse_perceptual_weight: 0.1
  frequency_weight: 0.5
  perceptual_weight: 0.15
  adversarial_weight: 0.01
  focal_alpha: 1.0
  focal_log_matrix: false

discriminator:
  in_channels: 3
  base_channels: 64
  n_layers: 3
  num_scales: 1 

logging:
  log_dir: "logs/pilot_supercaf_1024_to_512_paper"
  log_interval: 25
  vis_interval: 250
  eval_interval: 250
  eval_batches: 8
  save_interval: 1000
  save_checkpoints: true
  save_best_checkpoint: true
  save_best_metric: "masked_l1_hr_refined"
  save_best_mode: "min"
  save_final_checkpoint: true
  checkpoint_steps: [1000, 3000]
  keep_last_checkpoints: 3
  print_train_metrics: true
