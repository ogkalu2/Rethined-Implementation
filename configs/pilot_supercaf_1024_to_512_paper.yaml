# Short pilot config for checking whether metrics move in the right direction.

model:
  coarse_model:
    class: "CoarseModel"
    channels: [64, 128, 256, 384, 512]
    head_channels: 32
    use_rep_blocks: true
  generator:
    kernel_size: 8
    value_patch_size: 8
    attention_temperature: 0.5
    attention_top_k: 32
    attention_selection: "gumbel"
    attention_gumbel_tau: 1.0
    attention_warmup_selection: "softmax"
    attention_warmup_steps: 1200
    attention_warmup_top_k: null
    attention_gumbel_hard_start_step: 1800
    matching_descriptor_dim: 256
    matching_hidden_dim: 384
    match_coarse_rgb: true
    coarse_rgb_branch_dropout: 0
    query_image_context_matching: false
    separate_query_key_matching: true
    shared_query_key_descriptor: false
    query_context_channels: 48
    query_context_residual_init: 0.0
    key_context_channels: 48
    key_coarse_rgb_residual_init: 0.25
    key_feature_residual_init: 0.25
    nheads: 1
    stem_out_stride: 1
    stem_out_channels: 3
    image_size: 512
    embed_dim: 2048
    use_positional_encoding: true
    dropout: 0.1
    feature_i: 3
    feature_dim: null
    concat_features: true
    detach_coarse_rgb: false
    final_conv: false
    attention_masking: true
    supervision_band_radius: 1

data:
  root_dir: "."
  manifest_path: "dataset/manifests/supercaf_manifest.csv"
  val_dir: null
  image_size: 1024
  batch_size: 4
  eval_batch_size: 2
  num_workers: 2
  mask_min_coverage: 0.10
  mask_max_coverage: 0.40
  force_random_masks_train: true
  force_random_masks_eval: true

training:
  total_steps: 3000
  grad_accum_steps: 4
  lr: 0.001
  scorer_lr: 0.003
  warmup_steps: 200
  min_lr: 0.000001
  scorer_min_lr: 0.000003
  grad_clip: 1.0
  mixed_precision: true
  seed: 42
  betas: [0.9, 0.999]

loss:
  coarse_l2_weight: 1.0
  refined_l1_weight: 1.0
  refined_query_patch_l1_weight: 0.25
  retrieval_loss_weight: 0.5
  retrieval_hard_ce_weight: 1.0
  retrieval_teacher_patch_padding: 8
  retrieval_teacher_temperature: 0.15
  loss_schedule_focus_steps: 0
  loss_schedule_transition_steps: 0
  perceptual_weight: 0.15

logging:
  log_dir: "logs/pilot_supercaf_1024_to_512_paper"
  log_interval: 25
  vis_interval: 250
  eval_interval: 250
  eval_batches: 8
  save_interval: 1000
  save_checkpoints: true
  save_best_checkpoint: true
  save_best_metric: "masked_l1_hr_refined"
  save_best_mode: "min"
  save_final_checkpoint: true
  checkpoint_steps: [1000, 3000]
  keep_last_checkpoints: 3
  print_train_metrics: true
