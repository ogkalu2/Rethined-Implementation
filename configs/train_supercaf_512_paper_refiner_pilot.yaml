# SuperCAF joint-HR pilot: 512px crops with a paper-facing 256px LR refiner.
# This keeps the short pilot length used in prior experiments; the paper's full
# schedule is still 600k steps.

model:
  coarse_model:
    variant: "s4"
  generator:
    kernel_size: 8
    nheads: 1
    stem_out_stride: 1
    stem_out_channels: 3
    merge_mode: "all"
    image_size: 256
    embed_dim: 2048
    use_qpos: null
    use_kpos: null
    dropout: 0.1
    feature_i: 3
    concat_features: true
    final_conv: true
    feature_dim: 896
    attention_type: "MultiHeadAttention"
    compute_v: false
    use_argmax: false
    refiner_formulation: "paper"
    residual_refinement: false
    refinement_backend: "patch_attention"
    patch_match_mode: "full"
    attn_topk: null
    attn_add_residual: false
    token_use_mask_ratio: false
    attention_masking: true
    soft_key_mask_scale: 0.0
    apply_k_mask: false
    paper_mask_renormalize: false

data:
  root_dir: "."
  manifest_path: "dataset/manifests/supercaf_manifest.csv"
  val_dir: null
  image_size: 512
  batch_size: 4
  eval_batch_size: 4
  num_workers: 4
  mask_min_coverage: 0.30
  mask_max_coverage: 0.50

training:
  total_steps: 5000
  grad_accum_steps: 32
  lr: 0.001
  warmup_steps: 1000
  min_lr: 0.000001
  grad_clip: 1.0
  mixed_precision: true
  seed: 42
  train_mode: "joint"
  joint_hr_pipeline: true
  freeze_coarse: false

loss:
  l1_hole_weight: 6.0
  l1_valid_weight: 1.0
  perceptual_weight: 0.1
  style_weight: 0.0
  gate_selective_weight: 0.0
  gate_selective_margin: 0.0
  sample_improvement_weight: 0.0
  sample_improvement_margin: 0.0
  selector_choice_weight: 0.0
  selector_choice_margin: 0.0
  head_oracle_weight: 0.0
  head_oracle_margin: 0.0
  coarse_anchor_weight: 0.0
  oracle_patch_weight: 0.0
  oracle_patch_margin: 0.0
  hr_refined_weight: 1.0
  hr_perceptual_weight: 0.0
  hr_style_weight: 0.0

logging:
  log_dir: "logs/train_supercaf_512_to_256_paper_refiner_pilot"
  log_interval: 100
  vis_interval: 2500
  eval_interval: 1000
  eval_batches: 8
  save_interval: 5000
  save_checkpoints: true
  save_final_checkpoint: true
  checkpoint_steps: [5000]
  keep_last_checkpoints: 3
