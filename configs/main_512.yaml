# Main Training Run, 512x512 input
model:
  coarse_model:
    class: "CoarseModel"
    channels: [64, 128, 256, 384, 512]
    head_channels: 32
    use_rep_blocks: true
  generator:
    kernel_size: 8
    value_patch_size: 8
    value_source: "rgb"
    attention_temperature: 0.5
    attention_top_k: 32
    attention_selection: "gumbel"
    attention_gumbel_tau: 1.0
    attention_warmup_selection: "softmax"
    attention_warmup_steps: 6000
    attention_warmup_top_k: null
    attention_gumbel_hard_start_step: 9000
    matching_descriptor_dim: 256
    matching_hidden_dim: 384
    coarse_query_modulation_hidden_dim: 64
    coarse_query_modulation_strength: 0.25
    reranker_hidden_dim: 0
    reranker_query_chunk_size: 256
    reranker_source_context_radius: 1
    reranker_stage1_logit_scale: 0.0
    match_coarse_rgb: true
    match_coarse_rgb_on_key: false
    coarse_rgb_branch_dropout: 0
    query_image_context_matching: false
    separate_query_key_matching: true
    shared_query_key_descriptor: false
    query_context_channels: 48
    query_context_residual_init: 0.0
    key_context_channels: 48
    key_coarse_rgb_residual_init: 0.0
    key_feature_residual_init: 0.0
    nheads: 1
    stem_out_stride: 1
    stem_out_channels: 3
    image_size: 512
    embed_dim: 2048
    use_positional_encoding: true
    dropout: 0.1
    feature_i: 3
    feature_dim: null
    concat_features: true
    concat_features_on_key: false
    detach_coarse_rgb: false
    fusion_mode: "gate"
    final_conv: true
    attention_masking: true
    supervision_band_radius: 1

data:
  root_dir: "."
  manifest_path: "dataset/manifests/main_dataset_manifest.csv"
  val_dir: null
  image_size: 1024
  batch_size: 4
  eval_batch_size: 2
  num_workers: 2
  mask_min_coverage: 0.10
  mask_max_coverage: 0.35
  force_random_masks_train: true
  force_random_masks_eval: true

training:
  total_steps: 178218
  grad_accum_steps: 4
  lr: 0.001
  discriminator_lr: 0.00002
  warmup_steps: 3000
  min_lr: 0.000001
  discriminator_min_lr: 0.0000001
  grad_clip: 1.0
  discriminator_grad_clip: 1.0
  mixed_precision: true
  seed: 42
  betas: [0.9, 0.999]

loss:
  coarse_l2_weight: 1.0
  coarse_blur_l1_weight: 0.5
  coarse_gradient_weight: 0.1
  coarse_perceptual_weight: 0.1
  refined_l1_weight: 1.0
  refined_query_patch_l1_weight: 0.25
  retrieval_loss_weight: 1.0
  reranker_loss_weight: 0.0
  retrieval_teacher_patch_padding: 8
  retrieval_teacher_temperature: 0.07
  boundary_identity_weight: 0.25
  coordinate_loss_weight: 0.2
  coherence_loss_weight: 0.1
  loss_schedule_focus_steps: 0
  loss_schedule_transition_steps: 0
  frequency_weight: 0.0
  perceptual_weight: 0.1
  adversarial_weight: 0.02
  adversarial_mode: "hinge"
  focal_alpha: 1.0
  focal_log_matrix: false

discriminator:
  in_channels: 3
  base_channels: 64
  n_layers: 3
  num_scales: 1 

logging:
  log_dir: "logs/train_main"
  log_interval: 50
  vis_interval: 1000
  eval_interval: 1000
  eval_batches: 16
  save_interval: 5000
  save_checkpoints: true
  save_best_checkpoint: true
  save_best_metric: "masked_l1_hr_refined"
  save_best_mode: "min"
  save_final_checkpoint: true
  checkpoint_steps: [50000, 100000, 178218]
  keep_last_checkpoints: 3
  print_train_metrics: false
