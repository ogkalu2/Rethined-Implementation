# RETHINED V6 - refinement-fix training config
# Dataset: DF2K (DIV2K + Flickr2K), 512x512, 600K steps

model:
  coarse_model:
    variant: "s4"
  generator:
    kernel_size: 8
    nheads: 1
    stem_out_stride: 1
    stem_out_channels: 3
    merge_mode: "all"
    image_size: 512
    embed_dim: 2048
    use_qpos: null
    use_kpos: null
    dropout: 0.1
    feature_i: 3
    concat_features: true
    final_conv: true
    feature_dim: 896
    attention_type: "MultiHeadAttention"
    compute_v: false
    use_argmax: false

data:
  root_dir: "datasets/df2k"
  val_dir: null
  image_size: 512
  batch_size: 4
  num_workers: 4
  mask_min_coverage: 0.30
  mask_max_coverage: 0.50

training:
  total_steps: 600000
  grad_accum_steps: 32
  lr: 0.0001
  warmup_steps: 1000
  min_lr: 0.000001
  grad_clip: 1.0
  mixed_precision: true
  seed: 42

loss:
  l1_hole_weight: 6.0
  l1_valid_weight: 1.0
  perceptual_weight: 0.1
  style_weight: 0.0

logging:
  log_dir: "logs/train_df2k_512_v6"
  log_interval: 100
  vis_interval: 5000
  eval_interval: 10000
  save_interval: 50000
  checkpoint_steps: [10000, 30000, 50000, 100000, 150000, 200000, 300000, 400000, 600000]
  keep_last_checkpoints: 10
