# Overfit probe for the current architecture at 512px native -> 1024px HR.
# Uses small batches and frequent validation/visualization to judge whether the
# model can memorize a tiny set with large masks before committing to a full run.

model:
  coarse_model:
    class: "CoarseModel"
    channels: [64, 128, 280, 400, 528]
    head_channels: 32
    use_rep_blocks: true
  generator:
    kernel_size: 8
    nheads: 1
    stem_out_stride: 1
    stem_out_channels: 3
    image_size: 512
    embed_dim: 576
    use_positional_encoding: true
    dropout: 0.1
    feature_i: 2
    feature_dim: null
    concat_features: true
    final_conv: true
    attn_topk: 32
    attn_temperature: 0.7
    attention_masking: true
    paper_mask_renormalize: true

data:
  root_dir: "."
  manifest_path: "dataset/manifests/supercaf_manifest.csv"
  val_dir: null
  image_size: 1024
  batch_size: 1
  eval_batch_size: 1
  num_workers: 2
  mask_min_coverage: 0.30
  mask_max_coverage: 0.50

training:
  total_steps: 2000
  grad_accum_steps: 1
  lr: 0.001
  discriminator_lr: 0.001
  warmup_steps: 100
  min_lr: 0.000001
  discriminator_min_lr: 0.000001
  grad_clip: 1.0
  discriminator_grad_clip: 1.0
  mixed_precision: true
  seed: 42
  betas: [0.9, 0.999]

loss:
  coarse_l2_weight: 1.0
  frequency_weight: 1.0
  perceptual_weight: 0.1
  adversarial_weight: 0.01
  focal_alpha: 1.0
  focal_log_matrix: false

discriminator:
  in_channels: 3
  base_channels: 64
  n_layers: 3

logging:
  log_dir: "logs/overfit_supercaf_1024_from_512"
  log_interval: 10
  vis_interval: 100
  eval_interval: 100
  eval_batches: 0
  save_interval: 250
  save_checkpoints: true
  save_final_checkpoint: true
  checkpoint_steps: [250, 500, 1000, 2000]
  keep_last_checkpoints: 4
