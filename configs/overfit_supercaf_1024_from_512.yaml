# Overfit probe for the current architecture at 512px native -> 1024px HR.
# Uses small batches and frequent validation/visualization to judge whether the
# model can memorize a tiny set with large masks before committing to a full run.

model:
  coarse_model:
    class: "CoarseModel"
    channels: [64, 128, 280, 400, 528]
    head_channels: 32
    use_rep_blocks: true
  generator:
    kernel_size: 8
    nheads: 1
    stem_out_stride: 1
    stem_out_channels: 3
    merge_mode: "all"
    image_size: 512
    embed_dim: 576
    use_qpos: true
    use_kpos: true
    dropout: 0.1
    feature_i: 2
    feature_dim: null
    concat_features: true
    final_conv: true
    attention_type: "MultiHeadAttention"
    compute_v: false
    use_argmax: false
    attn_topk: 32
    attn_add_residual: false
    attn_temperature: 0.7
    token_use_mask_ratio: false
    attention_masking: true
    paper_mask_renormalize: true
    mask_patch_ratio_threshold: 0.05
    min_valid_patches: 8
    use_entropy_confidence: false
    hr_candidate_topk: 32
    hr_feature_pool_size: 4
    hr_rescore_dim: 64
    hr_rescore_hidden_dim: 128
    hr_query_chunk_size: 128
    use_hr_residual_refiner: true
    hr_refiner_channels: 32
    hr_refiner_blocks: 4
    hr_refiner_template_size: 4

data:
  root_dir: "."
  manifest_path: "dataset/manifests/supercaf_manifest.csv"
  val_dir: null
  image_size: 1024
  batch_size: 1
  eval_batch_size: 1
  num_workers: 2
  mask_min_coverage: 0.30
  mask_max_coverage: 0.50

training:
  total_steps: 2000
  grad_accum_steps: 1
  lr: 0.001
  warmup_steps: 100
  refinement_start_step: 0
  refinement_warmup_steps: 500
  refinement_lr_scale: 1.0
  coarse_freeze_step: null
  min_lr: 0.000001
  grad_clip: 1.0
  mixed_precision: true
  seed: 42
  joint_hr_pipeline: true
  freeze_coarse: false
  auto_freeze_coarse: true

loss:
  coarse_weight: 1.0
  refined_weight: 1.0
  l1_hole_weight: 6.0
  l1_valid_weight: 1.0
  perceptual_weight: 0.1
  style_weight: 0.0
  hr_refined_weight: 2.0
  hr_perceptual_weight: 0.1
  hr_style_weight: 0.0
  gain_ratio_weight: 0.25
  hr_gain_ratio_weight: 1.0

logging:
  log_dir: "logs/overfit_supercaf_1024_from_512"
  log_interval: 10
  vis_interval: 100
  eval_interval: 100
  eval_batches: 0
  save_interval: 250
  save_checkpoints: true
  save_final_checkpoint: true
  checkpoint_steps: [250, 500, 1000, 2000]
  keep_last_checkpoints: 4
